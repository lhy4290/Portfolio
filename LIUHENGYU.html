                <p class="text-sm text-gray-600 mb-2"><strong>對應：圖表一 (流量趨勢)</strong></p>
                <p class="text-sm text-gray-600 leading-relaxed">為繪製「各階段社群觸及趨勢」，需將日報表依時間序列分組。利用 Pandas 的日期處理功能提取月份，再透過 <code>unstack()</code> 展開為適合繪製折線圖的寬表格結構。</p>
            </div>
            <div class="lg:w-2/3">
<pre class="code-block"><code><span class="py-keyword">import</span> pandas <span class="py-keyword">as</span> pd

<span class="py-comment"># 1. 處理時間序列 (Time Series)</span>
df[<span class="py-string">'Date'</span>] = pd.<span class="py-function">to_datetime</span>(df[<span class="py-string">'發布日期'</span>])
df[<span class="py-string">'Month'</span>] = df[<span class="py-string">'Date'</span>].dt.to_period(<span class="py-string">'M'</span>)

<span class="py-comment"># 2. 分組與聚合 (Groupby & Unstack)</span>
trend_df = df.<span class="py-function">groupby</span>([<span class="py-string">'Month'</span>, <span class="py-string">'Platform'</span>]) \\
             [<span class="py-string">'觸及人數'</span>].<span class="py-function">sum</span>().<span class="py-function">unstack</span>()

<span class="py-comment"># 3. 處理缺失值 (Fill NA)</span>
trend_df = trend_df.<span class="py-function">fillna</span>(<span class="py-number">0</span>).<span class="py-function">astype</span>(<span class="py-built_in">int</span>)</code></pre>
            </div>
        </div>

        <!-- Code Snippet 2 -->
        <div class="card flex flex-col lg:flex-row gap-6 items-stretch">
            <div class="lg:w-1/3 flex flex-col justify-center">
                <h3 class="text-lg font-bold text-gray-800 mb-2"><i class="fas fa-filter text-purple-500 mr-2"></i>多維度特徵萃取</h3>
                <p class="text-sm text-gray-600 mb-2"><strong>對應：圖表二 (內容格式成效)</strong></p>
                <p class="text-sm text-gray-600 leading-relaxed">為了比較 Reels 短影音與一般圖文的差異，我們透過 <code>agg()</code> 函數同時計算多個指標。這裡展現了如何一次性獲取「平均曝光」與「平均互動率」，為雙 Y 軸提供數據基礎。</p>
            </div>
            <div class="lg:w-2/3">
<pre class="code-block"><code><span class="py-comment"># 內容載體成效分析 (曝光 vs 互動)</span>
format_df = df.<span class="py-function">groupby</span>(<span class="py-string">'Format'</span>).<span class="py-function">agg</span>(
    Avg_Reach=(<span class="py-string">'觸及人數'</span>, <span class="py-string">'mean'</span>),
    Avg_ER=(<span class="py-string">'互動率'</span>, <span class="py-string">'mean'</span>)
).<span class="py-function">reset_index</span>()

<span class="py-comment"># 依曝光量進行降冪排序 (Sorting)</span>
format_df = format_df.<span class="py-function">sort_values</span>(
    by=<span class="py-string">'Avg_Reach'</span>, 
    ascending=<span class="py-bool">False</span>
)</code></pre>
            </div>
        </div>

        <!-- Code Snippet 3 -->

            <div class="lg:w-1/3 flex flex-col justify-center">
                <h3 class="text-lg font-bold text-gray-800 mb-2"><i class="fas fa-bolt text-yellow-500 mr-2"></i>向量化運算 (Vectorization)</h3>
                <p class="text-sm text-gray-600 mb-2"><strong>對應：圖表三 (互動佔比)</strong></p>
                <p class="text-sm text-gray-600 leading-relaxed">在計算圓餅圖比例時，摒棄傳統的 <code>for-loop</code>，直接利用 Pandas 的向量化特性對整欄數據求和，並計算百分比，大幅提升了百萬級距數據的處理效能與簡潔度。</p>
            </div>
            <div class="lg:w-2/3">
<pre class="code-block"><code><span class="py-comment"># 定義深度互動指標欄位</span>
cols = [<span class="py-string">'愛心數'</span>, <span class="py-string">'收藏數'</span>, <span class="py-string">'分享數'</span>, <span class="py-string">'留言數'</span>]
interactions = df[cols].<span class="py-function">sum</span>()

<span class="py-comment"># 計算各指標佔比 (Percentage Calculation)</span>
ratios = (interactions / interactions.<span class="py-function">sum</span>()) * <span class="py-number">100</span>

<span class="py-comment"># 轉換為前端 Chart.js 所需之 JSON 格式</span>
chart_data = ratios.<span class="py-function">round</span>(<span class="py-number">1</span>).<span class="py-function">to_dict</span>()</code></pre>

                    </div>
                  )}
                  
                  {selectedWork.type === 'social' && (
                    <div className="flex flex-wrap gap-2 mt-auto pt-4">
                      {['#SocialMedia', '#DataDriven', '#ContentMarketing'].map(tag => (
                        <span key={tag} className="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded">
                          {tag}
                        </span>
                      ))}
                    </div>
                  )}
                  {(selectedWork.type === 'project' || selectedWork.type === 'analytics') && (
                    <div className="flex flex-wrap gap-2 mt-auto pt-4">
                      {['#DataAnalysis', '#Campaign', '#Marketing'].map(tag => (
                        <span key={tag} className="text-xs font-semibold text-zinc-600 bg-zinc-100 border border-zinc-200 px-2 py-1 rounded">
                          {tag}
                        </span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Portfolio />);
